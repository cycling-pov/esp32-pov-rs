[target.xtensa-esp32s3-none-elf]
# The partition table CSV is selected at build time by build.rs based on the
# active flash-size feature (flash-4mb, flash-8mb, or flash-16mb) and written to
# target/esp-spoke-firmware-partitions.csv before espflash is invoked.
runner = "espflash flash --monitor --chip esp32s3 --log-format defmt --partition-table target/partitions.csv"
rustflags = ["-C", "link-arg=-nostartfiles"]

[env]
DEFMT_LOG = "info"
# ekv compile-time configuration (must match the flash sector size and chunk sizes)
EKV_PAGE_SIZE = "4096"
EKV_MAX_VALUE_SIZE = "4096"
EKV_MAX_KEY_SIZE = "8"

[build]
target = "xtensa-esp32s3-none-elf"

[unstable]
build-std = ["alloc", "core"]
